<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Favorite Books</title>
</head>
<body>

  <h1>My Favorite Books</h1>

  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Author</th>
        <th>ISBN</th>
      </tr>
    </thead>
    <tbody id="books-table-body">
    </tbody>
  </table>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://ykoubzpaxdxwfpsqplem.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlrb3VienBheGR4d2Zwc3FwbGVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MDM3NDQsImV4cCI6MjA4Nzk3OTc0NH0.9wcmmF_MSYZC2qV90Gf3lio_ZMM-hTdrIIlmQnmrvtw";

    const { createClient } = supabase;
    const client = createClient(supabaseUrl, supabaseKey);

    async function fetchBooks() {
      const { data, error } = await client
        .from('books')
        .select('*');

      if (error) {
        console.error('Error fetching books:', error);
        return;
      }

      const tableBody = document.getElementById('books-table-body');

      data.forEach(book => {
        const row = document.createElement('tr');

        row.innerHTML = `
          <td>${book.Title}</td>
          <td>${book.Author}</td>
          <td>${book.ISBN}</td>
        `;

        tableBody.appendChild(row);
      });
    }

    fetchBooks();
  </script>

</body>
</html>
